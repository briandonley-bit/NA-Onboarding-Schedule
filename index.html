<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Onboarding Scheduler</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --border:#e2e4e9; --text:#1c1f26; --muted:#6b7280;
    --accent:#2563eb; --accent-light:#e8efff; --danger:#dc2626; --row-h:64px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;white-space:nowrap;}
  .weeks-tabs{display:flex;gap:4px;}
  .week-tab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);}
  .week-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .header-spacer{flex:1;}
  .btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{background:#f0f1f3;}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{background:#1d4ed8;}
  .btn.danger{color:var(--danger);border-color:#fca5a5;}
  .status-pill{font-size:12px;color:var(--muted);padding:4px 10px;border-radius:20px;background:#f0f1f3;white-space:nowrap;}
  .status-pill.dirty{background:#fff7ed;color:#c2410c;}
  .status-pill.synced{background:#ecfdf5;color:#047857;}
  .banner{background:#fffbeb;border-bottom:1px solid #fde68a;color:#92400e;padding:8px 20px;font-size:13px;display:flex;align-items:center;gap:10px;}
  .layout{display:flex;align-items:flex-start;gap:0;}
  aside{width:280px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);min-height:calc(100vh - 57px);padding:14px;transition:background .1s;}
  aside.drop-hover{background:var(--accent-light);}
  aside h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px;}
  .backlog-item{border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#fff;cursor:grab;display:flex;gap:8px;align-items:flex-start;}
  .backlog-item:active{cursor:grabbing;}
  .color-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
  .backlog-item .info{flex:1;min-width:0;}
  .backlog-item .title{font-weight:600;font-size:13px;}
  .backlog-item .subtitle{font-size:11px;color:var(--muted);}
  .backlog-item .owner{font-size:11px;color:var(--accent);}
  .backlog-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}
  main{flex:1;overflow-x:auto;padding:16px;}
  .week-meta{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .grid-wrap{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:900px;}
  .grid-header{display:grid;grid-template-columns:130px repeat(5,1fr);border-bottom:1px solid var(--border);}
  .grid-header .cell{padding:10px 8px;font-size:12px;font-weight:700;text-align:center;border-left:1px solid var(--border);}
  .grid-header .cell:first-child{border-left:none;}
  .grid-body{display:grid;grid-template-columns:130px repeat(5,1fr);}
  .time-col{border-left:none;}
  .time-col .time-label{height:var(--row-h);border-bottom:1px solid var(--border);padding:4px 8px;line-height:1.25;display:flex;flex-direction:column;justify-content:center;}
  .tz-tag{display:inline-block;width:26px;font-weight:700;color:#9ca3af;}
  .tz-primary{font-size:14px;font-weight:700;color:var(--text);}
  .tz-primary .tz-tag{color:var(--accent);}
  .tz-secondary{font-size:10px;color:var(--muted);margin-top:1px;}
  .day-col{position:relative;border-left:1px solid var(--border);}
  .slot-bg{height:var(--row-h);border-bottom:1px solid #f0f1f3;}
  .slot-bg.hover{background:var(--accent-light);}
  .meeting-block{position:absolute;left:3px;right:3px;border-radius:7px;padding:6px 8px;color:#fff;overflow:hidden;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .meeting-block:active{cursor:grabbing;}
  .meeting-block .m-title{font-size:12px;font-weight:700;line-height:1.25;}
  .meeting-block .m-subtitle{font-size:10.5px;opacity:.9;line-height:1.2;margin-top:1px;}
  .meeting-block .m-owner{font-size:10px;opacity:.85;margin-top:2px;font-style:italic;}
  .resize-handle{position:absolute;left:0;right:0;bottom:0;height:7px;cursor:ns-resize;}
  .resize-handle::after{content:"";position:absolute;left:50%;bottom:2px;width:24px;height:3px;margin-left:-12px;background:rgba(255,255,255,.6);border-radius:2px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,18,25,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:#fff;border-radius:12px;padding:22px;width:380px;max-width:92vw;box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .field input[type=text],.field select{width:100%;padding:7px 9px;border-radius:7px;border:1px solid var(--border);font-size:13px;}
  .swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.selected{border-color:#111;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:18px;gap:8px;flex-wrap:wrap;}
  .modal-actions .left{display:flex;gap:8px;}
  .modal-actions .right{display:flex;gap:8px;}
  .settings-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  .note{font-size:11.5px;color:var(--muted);line-height:1.5;background:#f7f8fa;padding:8px 10px;border-radius:8px;margin-top:6px;}
  a{color:var(--accent);}
</style>
</head>
<body>

<header>
  <h1>📋 Sales Onboarding Scheduler</h1>
  <div class="weeks-tabs" id="weekTabs"></div>
  <div class="header-spacer"></div>
  <span class="status-pill" id="statusPill">Loading…</span>
  <button class="btn" id="btnReload">↻ Reload</button>
  <button class="btn primary" id="btnSave">Save to GitHub</button>
  <button class="btn" id="btnCalendar">🗓️ Calendar &amp; Invites</button>
  <button class="btn" id="btnSettings">⚙ Settings</button>
</header>

<div class="banner" id="remoteBanner" style="display:none;">
  A newer version was saved to GitHub. <button class="btn" id="btnBannerReload">Reload latest</button>
</div>

<div class="layout">
  <aside>
    <h2>Not Yet Scheduled</h2>
    <div id="backlogList"></div>
    <button class="btn" id="btnAddMeeting" style="width:100%;justify-content:center;margin-top:6px;">+ Add meeting</button>
    <div class="note">Drag any item onto the calendar to schedule it, or drag a scheduled block back here to unschedule it. Times shown as EST (primary), with CST and PST below.</div>
  </aside>

  <main>
    <div class="week-meta" id="weekMeta"></div>
    <div class="grid-wrap">
      <div class="grid-header" id="gridHeader"></div>
      <div class="grid-body" id="gridBody"></div>
    </div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
/* ---------------------------------------------------------------
   Sales Onboarding Scheduler
   Single-file static app. Data model lives in-memory as `state.schedule`
   and is persisted to a GitHub repo file via the GitHub Contents API.
---------------------------------------------------------------- */

const COLOR_PRESETS = ["#2563eb","#16a34a","#ea580c","#0891b2","#7c3aed","#db2777","#9333ea","#4b5563","#dc2626","#ca8a04"];
const ROW_H = 64; // must match CSS --row-h
const LS_KEYS = { owner:"ghOwner", repo:"ghRepo", branch:"ghBranch", path:"ghPath", token:"ghToken" };

let state = {
  schedule: null,
  currentWeekId: null,
  dirty: false,
  currentSha: null,
  pollTimer: null,
};

// ---------- Utility ----------
function minutesToParts(mins){
  mins = ((mins % 1440) + 1440) % 1440;
  let h = Math.floor(mins/60), m = mins%60;
  const ap = h >= 12 ? "PM" : "AM";
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ap}`;
}
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function b64EncodeUnicode(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64DecodeUnicode(str){ return decodeURIComponent(escape(atob(str))); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function ghConfig(){
  return {
    owner: localStorage.getItem(LS_KEYS.owner) || "",
    repo: localStorage.getItem(LS_KEYS.repo) || "",
    branch: localStorage.getItem(LS_KEYS.branch) || "main",
    path: localStorage.getItem(LS_KEYS.path) || "schedule.json",
    token: localStorage.getItem(LS_KEYS.token) || "",
  };
}
function ghConfigured(){
  const c = ghConfig();
  return !!(c.owner && c.repo && c.token);
}

// ---------- Data load ----------
async function loadSchedule(){
  setStatus("Loading…", "");
  if (ghConfigured()){
    try{
      const res = await ghGetFile();
      if (res){
        state.schedule = res.json;
        state.currentSha = res.sha;
        finishLoad();
        return;
      }
    }catch(e){
      console.warn("GitHub load failed, falling back", e);
    }
  }
  // fallback: relative fetch (works on GitHub Pages / local server)
  try{
    const r = await fetch("schedule.json", {cache:"no-store"});
    if (r.ok){
      state.schedule = await r.json();
      state.currentSha = null;
      finishLoad();
      return;
    }
  }catch(e){ /* ignore, fall through */ }
  // final fallback: inline default
  state.schedule = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
  state.currentSha = null;
  finishLoad();
}

function finishLoad(){
  if (!state.currentWeekId && state.schedule.weeks.length){
    state.currentWeekId = state.schedule.weeks[0].id;
  }
  state.dirty = false;
  renderAll();
  setStatus(ghConfigured() ? "Synced with GitHub" : "Using local demo data (connect GitHub in Settings)", ghConfigured() ? "synced" : "");
  startPolling();
}

// ---------- GitHub API ----------
async function ghGetFile(){
  const c = ghConfig();
  const url = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${encodeURI(c.path)}?ref=${encodeURIComponent(c.branch)}`;
  const res = await fetch(url, {
    headers: {
      "Authorization": `Bearer ${c.token}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
    }
  });
  if (res.status === 404) return null; // file doesn't exist yet
  if (!res.ok){
    const body = await res.text();
    throw new Error(`GitHub GET failed (${res.status}): ${body}`);
  }
  const data = await res.json();
  const json = JSON.parse(b64DecodeUnicode(data.content.replace(/\n/g,"")));
  return { json, sha: data.sha };
}

async function ghPeekSha(){
  const c = ghConfig();
  const url = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${encodeURI(c.path)}?ref=${encodeURIComponent(c.branch)}`;
  const res = await fetch(url, {
    headers: { "Authorization": `Bearer ${c.token}`, "Accept": "application/vnd.github+json" }
  });
  if (!res.ok) return null;
  const data = await res.json();
  return data.sha;
}

async function ghPutFile(message){
  const c = ghConfig();
  const url = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${encodeURI(c.path)}`;
  const body = {
    message: message || `Update onboarding schedule (${new Date().toISOString()})`,
    content: b64EncodeUnicode(JSON.stringify(state.schedule, null, 2)),
    branch: c.branch,
  };
  if (state.currentSha) body.sha = state.currentSha;
  const res = await fetch(url, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${c.token}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });
  if (res.status === 409){
    throw { conflict:true };
  }
  if (!res.ok){
    const t = await res.text();
    throw new Error(`GitHub save failed (${res.status}): ${t}`);
  }
  const data = await res.json();
  state.currentSha = data.content.sha;
  return data;
}

const AUTOSAVE_DELAY_MS = 2500;
let autosaveTimer = null;
function scheduleAutosave(){
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    autosaveTimer = null;
    saveToGitHub(true);
  }, AUTOSAVE_DELAY_MS);
}

async function saveToGitHub(isAuto){
  if (!ghConfigured()){ if (!isAuto) openSettingsModal(); return; }
  if (autosaveTimer){ clearTimeout(autosaveTimer); autosaveTimer = null; }
  setStatus(isAuto ? "Auto-saving…" : "Saving…", "");
  try{
    await ghPutFile();
    state.dirty = false;
    setStatus("Synced with GitHub", "synced");
  }catch(e){
    if (e && e.conflict){
      // Someone else saved a moment ago. Grab the latest sha and retry once so our
      // edit still lands, rather than discarding it — this favors "last save wins"
      // over losing work, which is the right tradeoff for a small team.
      try{
        const freshSha = await ghPeekSha();
        if (freshSha) state.currentSha = freshSha;
        await ghPutFile();
        state.dirty = false;
        setStatus("Synced with GitHub", "synced");
        return;
      }catch(e2){
        console.error(e2);
        setStatus("Sync conflict — reloading latest", "dirty");
        await loadSchedule();
        if (!isAuto) alert("Two edits landed at the exact same moment. Reloaded the latest version from GitHub — please redo your last change.");
      }
    } else {
      console.error(e);
      if (isAuto){
        setStatus("Auto-save failed — will retry", "dirty");
        scheduleAutosave();
      } else {
        alert("Save failed. Check your GitHub settings/token and try again.\n\n" + e.message);
        setStatus("Save failed", "dirty");
      }
    }
  }
}

function startPolling(){
  if (state.pollTimer) clearInterval(state.pollTimer);
  if (!ghConfigured()) return;
  state.pollTimer = setInterval(async () => {
    try{
      const sha = await ghPeekSha();
      if (!sha || !state.currentSha || sha === state.currentSha) return;
      if (state.dirty || autosaveTimer){
        // A local edit is in flight — let the autosave conflict-retry above
        // reconcile this shortly instead of yanking the schedule out from under it.
        return;
      }
      await loadSchedule();
      setStatus("↻ Updated by a teammate", "synced");
      setTimeout(() => { if (!state.dirty) setStatus("Synced with GitHub", "synced"); }, 2500);
    }catch(e){ /* ignore polling errors */ }
  }, 8000);
}

// ---------- Rendering ----------
function setStatus(text, cls){
  const el = document.getElementById("statusPill");
  el.textContent = text;
  el.className = "status-pill" + (cls ? " " + cls : "");
}

function markDirty(){
  state.dirty = true;
  if (ghConfigured()){
    setStatus("Unsaved changes — saving shortly…", "dirty");
    scheduleAutosave();
  } else {
    setStatus("Unsaved changes (connect GitHub in Settings to sync)", "dirty");
  }
}

function renderAll(){
  renderWeekTabs();
  renderWeekMeta();
  renderGridHeader();
  renderGridBody();
  renderBacklog();
}

function renderWeekTabs(){
  const wrap = document.getElementById("weekTabs");
  wrap.innerHTML = "";
  state.schedule.weeks.forEach(w => {
    const btn = document.createElement("button");
    btn.className = "week-tab" + (w.id === state.currentWeekId ? " active" : "");
    btn.textContent = w.label;
    btn.onclick = () => { state.currentWeekId = w.id; renderAll(); };
    wrap.appendChild(btn);
  });
}

function weekDayDate(w, dayIndex){
  if (!w.startDate) return null;
  const d = new Date(w.startDate + "T00:00:00");
  d.setDate(d.getDate() + dayIndex);
  return d;
}
function formatShortDate(d){
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function computedDateRangeLabel(w){
  const start = weekDayDate(w, 0);
  const end = weekDayDate(w, state.schedule.meta.days.length - 1);
  if (!start || !end) return w.dateRange || "dates not set";
  const sameMonth = start.getMonth() === end.getMonth();
  const startStr = formatShortDate(start);
  const endStr = sameMonth ? String(end.getDate()) : formatShortDate(end);
  return `${startStr}–${endStr}, ${start.getFullYear()}`;
}

function renderWeekMeta(){
  const w = state.schedule.weeks.find(w => w.id === state.currentWeekId);
  const el = document.getElementById("weekMeta");
  if (!w){ el.innerHTML = ""; return; }
  el.innerHTML = `${w.label} — ${computedDateRangeLabel(w)}
    <label style="font-size:12px;color:var(--muted);margin-left:10px;">Set this week's start date (Monday):
      <input type="date" id="weekStartDateInput" value="${w.startDate||""}" style="font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);margin-left:4px;">
    </label>`;
  document.getElementById("weekStartDateInput").addEventListener("change", (e) => {
    w.startDate = e.target.value;
    markDirty();
    renderWeekMeta();
    renderGridHeader();
  });
}

function renderGridHeader(){
  const el = document.getElementById("gridHeader");
  const w = state.schedule.weeks.find(w => w.id === state.currentWeekId);
  el.innerHTML = `<div class="cell"></div>` + state.schedule.meta.days.map((d, i) => {
    const date = w ? weekDayDate(w, i) : null;
    return `<div class="cell">${d}${date ? `<div style="font-size:10.5px;font-weight:400;color:var(--muted);margin-top:1px;">${formatShortDate(date)}</div>` : ""}</div>`;
  }).join("");
}

function slotStartMinutes(slotIndex){
  return state.schedule.meta.startMinutesPST + slotIndex * state.schedule.meta.slotMinutes;
}

function renderGridBody(){
  const el = document.getElementById("gridBody");
  el.innerHTML = "";
  const slotCount = state.schedule.meta.slotCount;

  // time column
  const timeCol = document.createElement("div");
  timeCol.className = "time-col";
  for (let i=0;i<slotCount;i++){
    const pst = slotStartMinutes(i);
    const div = document.createElement("div");
    div.className = "time-label";
    div.innerHTML = `
      <div class="tz-primary"><span class="tz-tag">EST</span>${minutesToParts(pst+180)}</div>
      <div class="tz-secondary"><span class="tz-tag">CST</span>${minutesToParts(pst+120)}</div>
      <div class="tz-secondary"><span class="tz-tag">PST</span>${minutesToParts(pst)}</div>`;
    timeCol.appendChild(div);
  }
  el.appendChild(timeCol);

  // day columns
  state.schedule.meta.days.forEach(day => {
    const col = document.createElement("div");
    col.className = "day-col";
    col.style.height = (slotCount * ROW_H) + "px";
    col.dataset.day = day;

    for (let i=0;i<slotCount;i++){
      const bg = document.createElement("div");
      bg.className = "slot-bg";
      bg.dataset.slot = i;
      col.appendChild(bg);
    }

    // drag over / drop handling
    col.addEventListener("dragover", (e) => {
      e.preventDefault();
      const slot = clampSlot(Math.floor((e.clientY - col.getBoundingClientRect().top) / ROW_H));
      highlightSlot(col, slot);
    });
    col.addEventListener("dragleave", () => clearHighlight(col));
    col.addEventListener("drop", (e) => {
      e.preventDefault();
      clearHighlight(col);
      const raw = e.dataTransfer.getData("text/plain");
      if (!raw) return;
      const payload = JSON.parse(raw);
      const slot = clampSlot(Math.floor((e.clientY - col.getBoundingClientRect().top) / ROW_H));
      handleDrop(payload, day, slot);
    });

    el.appendChild(col);
  });

  // place meeting blocks
  const meetings = state.schedule.meetings.filter(m => m.scheduled && m.weekId === state.currentWeekId);
  meetings.forEach(m => renderMeetingBlock(m));
}

function clampSlot(slot){
  const max = state.schedule.meta.slotCount - 1;
  return Math.max(0, Math.min(max, slot));
}
function highlightSlot(col, slot){
  clearHighlight(col);
  const bg = col.querySelector(`.slot-bg[data-slot="${slot}"]`);
  if (bg) bg.classList.add("hover");
}
function clearHighlight(col){
  col.querySelectorAll(".slot-bg.hover").forEach(x => x.classList.remove("hover"));
}

function renderMeetingBlock(m){
  const col = document.querySelector(`.day-col[data-day="${m.day}"]`);
  if (!col) return;
  const block = document.createElement("div");
  block.className = "meeting-block";
  block.draggable = true;
  block.style.top = (m.startSlot * ROW_H + 2) + "px";
  block.style.height = (m.durationSlots * ROW_H - 4) + "px";
  block.style.background = m.color;
  block.dataset.id = m.id;
  if (m.notes) block.title = m.notes;

  const inviteList = m.inviteListId ? (state.schedule.inviteLists||[]).find(l => l.id === m.inviteListId) : null;
  block.innerHTML = `
    <div class="m-title">${escapeHtml(m.title)}${m.notes ? ` <span title="${escapeHtml(m.notes)}">📝</span>` : ""}${inviteList ? ` <span title="Invites: ${escapeHtml(inviteList.name)}">✉️</span>` : ""}</div>
    ${m.subtitle ? `<div class="m-subtitle">${escapeHtml(m.subtitle)}</div>` : ""}
    ${m.owner ? `<div class="m-owner">👤 ${escapeHtml(m.owner)}</div>` : ""}
    <div class="resize-handle"></div>
  `;

  let resizing = false;

  block.addEventListener("dragstart", (e) => {
    if (resizing){ e.preventDefault(); return; }
    e.dataTransfer.setData("text/plain", JSON.stringify({ id: m.id, source: "grid" }));
    e.dataTransfer.effectAllowed = "move";
  });

  block.addEventListener("click", (e) => {
    if (resizing) return;
    openEditModal(m.id);
  });

  const handle = block.querySelector(".resize-handle");
  handle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    resizing = true;
    const startY = e.clientY;
    const startDuration = m.durationSlots;
    function onMove(ev){
      const deltaSlots = Math.round((ev.clientY - startY) / ROW_H);
      const maxDur = state.schedule.meta.slotCount - m.startSlot;
      m.durationSlots = Math.max(1, Math.min(maxDur, startDuration + deltaSlots));
      block.style.height = (m.durationSlots * ROW_H - 4) + "px";
    }
    function onUp(){
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      setTimeout(() => { resizing = false; }, 0);
      markDirty();
    }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  col.appendChild(block);
}

function handleDrop(payload, day, slot){
  const m = state.schedule.meetings.find(x => x.id === payload.id);
  if (!m) return;
  const dur = m.durationSlots || 1;
  const maxStart = state.schedule.meta.slotCount - dur;
  m.scheduled = true;
  m.weekId = state.currentWeekId;
  m.day = day;
  m.startSlot = Math.max(0, Math.min(maxStart, slot));
  m.durationSlots = dur;
  markDirty();
  renderAll();
}

function handleUnscheduleDrop(payload){
  if (payload.source !== "grid") return; // already in the backlog, nothing to do
  const m = state.schedule.meetings.find(x => x.id === payload.id);
  if (!m) return;
  m.scheduled = false;
  delete m.weekId; delete m.day; delete m.startSlot;
  markDirty();
  renderAll();
}

function initBacklogDropZone(){
  const zone = document.querySelector("aside");
  zone.addEventListener("dragover", (e) => {
    e.preventDefault();
    zone.classList.add("drop-hover");
  });
  zone.addEventListener("dragleave", (e) => {
    if (!zone.contains(e.relatedTarget)) zone.classList.remove("drop-hover");
  });
  zone.addEventListener("drop", (e) => {
    e.preventDefault();
    zone.classList.remove("drop-hover");
    const raw = e.dataTransfer.getData("text/plain");
    if (!raw) return;
    handleUnscheduleDrop(JSON.parse(raw));
  });
}

function renderBacklog(){
  const wrap = document.getElementById("backlogList");
  wrap.innerHTML = "";
  const items = state.schedule.meetings.filter(m => !m.scheduled);
  if (!items.length){
    wrap.innerHTML = `<div class="backlog-empty">Nothing waiting — everything is scheduled.</div>`;
    return;
  }
  items.forEach(m => {
    const row = document.createElement("div");
    row.className = "backlog-item";
    row.draggable = true;
    if (m.notes) row.title = m.notes;
    row.innerHTML = `
      <div class="color-dot" style="background:${m.color}"></div>
      <div class="info">
        <div class="title">${escapeHtml(m.title)}${m.notes ? " 📝" : ""}${m.inviteListId ? " ✉️" : ""}</div>

        ${m.owner ? `<div class="owner">👤 ${escapeHtml(m.owner)}</div>` : ""}

    row.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", JSON.stringify({ id: m.id, source: "backlog" }));
      e.dataTransfer.effectAllowed = "move";
    });

    wrap.appendChild(row);
  });
}

let googleTokenClient = null;
function connectGoogle(){
  const clientId = (localStorage.getItem("googleClientId")||"").trim();
  if (!clientId){ alert("Enter your Google OAuth Client ID first (see the note above the Connect button)."); return; }
  if (typeof google === "undefined" || !google.accounts || !google.accounts.oauth2){
    alert("Google's sign-in library hasn't loaded yet. Make sure you're online, then try again in a few seconds.");
    return;
  }
  googleTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/calendar.events",
    callback: (resp) => {
      if (resp.error){ alert("Google sign-in failed: " + resp.error); return; }
      state.googleToken = resp.access_token;
      state.googleTokenExpiry = Date.now() + (Number(resp.expires_in||3600) * 1000);
      openCalendarModal();
    }
  });
  googleTokenClient.requestAccessToken();
}

async function syncMeetingToCalendar(m, week){
  const list = state.schedule.inviteLists.find(l => l.id === m.inviteListId);
  if (!list || !list.emails.length) throw new Error("Invite list is empty");
  const dayIndex = state.schedule.meta.days.indexOf(m.day);
  const base = new Date(week.startDate + "T00:00:00");
  base.setDate(base.getDate() + dayIndex);
  const dateStr = `${base.getFullYear()}-${pad2(base.getMonth()+1)}-${pad2(base.getDate())}`;
  const pstStart = slotStartMinutes(m.startSlot);
  const estStartMin = pstStart + 180;
  const estEndMin = estStartMin + m.durationSlots * state.schedule.meta.slotMinutes;

  const event = {
    summary: m.title + (m.subtitle ? ` — ${m.subtitle}` : ""),
    description: [m.description, m.owner ? `Led by: ${m.owner}` : ""].filter(Boolean).join("\n\n"),
    start: { dateTime: `${dateStr}T${minsToHHMMSS(estStartMin)}`, timeZone: "America/New_York" },
    end: { dateTime: `${dateStr}T${minsToHHMMSS(estEndMin)}`, timeZone: "America/New_York" },
    attendees: list.emails.map(email => ({ email })),
  };
  // Only request a brand-new Meet link if this meeting doesn't already have one —
  // once created, Google keeps the same link on subsequent updates automatically.
  if (!m.meetLink){
    event.conferenceData = {
      createRequest: {
        requestId: uid("meet"),
        conferenceSolutionKey: { type: "hangoutsMeet" },
      },
    };
  }

  const urlBase = m.calendarEventId
    ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${m.calendarEventId}`
    : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
  const url = `${urlBase}?sendUpdates=all&conferenceDataVersion=1`;
  const res = await fetch(url, {
    method: m.calendarEventId ? "PATCH" : "POST",
    headers: { "Authorization": `Bearer ${state.googleToken}`, "Content-Type": "application/json" },
    body: JSON.stringify(event),
  });
  if (!res.ok){
    const t = await res.text();
    throw new Error(`Calendar API error (${res.status}): ${t}`);
  }
  const data = await res.json();
  m.calendarEventId = data.id;
  m.calendarEventLink = data.htmlLink;
  if (data.hangoutLink) m.meetLink = data.hangoutLink;
}

async function sendInvitesForCurrentWeek(){
  const statusEl = document.getElementById("sendStatus");
  if (!state.googleToken || Date.now() > (state.googleTokenExpiry||0)){
    alert("Connect Google Calendar first (button above).");
    return;
  }
  const week = state.schedule.weeks.find(w => w.id === state.currentWeekId);
  if (!week || !week.startDate){
    alert("Set this week's Monday date first (the date field above the calendar grid) before sending invites.");
    return;
  }
  const meetings = state.schedule.meetings.filter(m => m.scheduled && m.weekId === week.id && m.inviteListId);
  if (!meetings.length){
    statusEl.textContent = "No meetings in this week have an invite list assigned yet — open a meeting and set one.";
    return;
  }
  statusEl.textContent = `Sending ${meetings.length} invite(s)...`;
  let sent = 0, failed = 0;
  for (const m of meetings){
    try{
      await syncMeetingToCalendar(m, week);
      sent++;
    }catch(e){
      console.error(e);
      failed++;
    }
  }
  statusEl.textContent = `Done: ${sent} sent${failed ? `, ${failed} failed (see console)` : ""}.`;
  markDirty();
  renderAll();
}
